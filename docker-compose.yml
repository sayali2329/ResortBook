services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      SECRET_KEY: change-me-in-production
      JWT_SECRET_KEY: change-me-in-production
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000
    volumes:
      - booking_data:/app/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  booking_data:
